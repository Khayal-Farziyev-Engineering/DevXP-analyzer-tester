name: DevXP Analyze on Main Push

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read

jobs:
  devxp-analyze:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Submit metrics to DevXP
        uses: Karimov-Labs/dev-xp-analyzer@main
        with:
          api-token: ${{ secrets.DEVXP_API_KEY }}
          api-endpoint: https://push.devxp.net
          event-type: auto
          include-file-content: 'false'
          mask-identities: 'false'
